name: Test Pipeline

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'airflow/**'


jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: make install-dev
        working-directory: ./airflow
      - name: Run tests
        run: make test
        working-directory: ./airflow
