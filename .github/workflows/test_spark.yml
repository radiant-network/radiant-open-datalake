name: Scala CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'spark/**'

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v3
      with:
        distribution: 'adopt'
        java-version: '11'
        cache: 'sbt'
    - uses: sbt/setup-sbt@v1
    - name: Run spark tests
      run: sbt test
      working-directory: ./spark
