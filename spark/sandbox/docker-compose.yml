services:
  rest:
    image: apache/iceberg-rest-fixture
    container_name: iceberg-rest
    networks:
      iceberg_net:
    ports:
      - 8181:8181
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT=http://minio:9000
      - CATALOG_WAREHOUSE_LOCATION=s3://opendatalake-qa/iceberg
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
  minio:
    image: minio/minio
    container_name: minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
      - MINIO_DOMAIN=minio
    networks:
      iceberg_net:
        aliases:
          # This alias enables virtual-host-style S3 access (e.g., http://opendatalake-qa.minio:9000)
          # from within the Docker network. However, this will NOT work for Spark or clients running 
          # outside Docker. 
          # If you want to use virtual-host-style access from outside the docker network, you can
          # add the following entry to your /etc/hosts file: 127.0.0.1 opendatalake-qa.localhost
          - opendatalake-qa.minio
    ports:
      - 9001:9001
      - 9000:9000
    command: ["server", "/data", "--console-address", ":9001"]
  
  mc:
    depends_on:
      - minio
    image: minio/mc
    container_name: mc
    networks:
      iceberg_net:
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    entrypoint: |
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 admin password) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc rm -r --force minio/opendatalake-qa;
      /usr/bin/mc mb minio/opendatalake-qa;
      tail -f /dev/null
      "
networks:
  iceberg_net: